# cycms 默认系统配置模板
# 所有字段均可通过环境变量覆盖，格式：CYCMS__<SECTION>__<KEY>
# 示例：CYCMS__SERVER__PORT=9000

[server]
host = "0.0.0.0"
port = 8080

[server.rate_limit]
# 每用户（已认证）或来源 IP（匿名）的请求配额，单位：次/分钟
requests_per_minute = 60
# 敏感端点（登录/注册/刷新）独立配额
sensitive_requests_per_minute = 10

[server.cors]
allowed_origins = ["http://localhost:3000"]
allow_credentials = true
# OPTIONS 预检缓存时长（秒）
max_age_secs = 600

[database]
# 支持 postgres / mysql / sqlite

# driver = "postgres"
# url = "postgres://cycms:cycms@localhost:5432/cycms"

# driver = "mysql"
# url = "mysql://cycms:cycms@localhost:3306/cycms"

driver = "sqlite"
url = "sqlite://data/cycms.db"

max_connections = 10

[auth]
# 生产环境务必替换为强随机密钥（至少 32 字节）,使用openssl生成示例：openssl rand -hex 32
jwt_secret = "98b12c04adb7f53b1a136a6565bd250d606234dde8b152da122387a4ca8399a8"
# access_token 有效期（秒），默认 15 分钟
access_token_ttl_secs = 900
# refresh_token 有效期（秒），默认 14 天
refresh_token_ttl_secs = 1209600

[auth.argon2]
m_cost = 19456
t_cost = 2
p_cost = 1

[media]
upload_dir = "uploads"
# 最大文件大小（字节），默认 10 MB
max_file_size = 10485760
allowed_mime_types = [
    "image/jpeg",
    "image/png",
    "image/gif",
    "image/webp",
    "application/pdf",
    "video/mp4",
]

[events]
# 单个事件桶的 broadcast channel 容量
channel_capacity = 256
# 单个 handler 处理一次事件的超时（秒）
handler_timeout_secs = 5

[observability]
# pretty 适合本地开发；生产环境建议改为 json
format = "pretty"
# 支持 tracing EnvFilter 语法；简单场景可直接用 trace/debug/info/warn/error
level = "info"
# 是否将关键业务事件写入 audit_logs
audit_enabled = true

[plugins]
# 插件存放目录
directory = "plugins"
wasm_enabled = true
