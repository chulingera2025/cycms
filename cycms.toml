# cycms 配置模板
# 所有字段均可通过环境变量覆盖，格式：CYCMS__<SECTION>__<KEY>
# 示例：CYCMS__SERVER__PORT=9000

[server]
host = "0.0.0.0"
port = 8080

[server.rate_limit]
# 每用户（已认证）或来源 IP（匿名）的请求配额，单位：次/分钟
requests_per_minute = 60
# 敏感端点（登录/注册/刷新）独立配额
sensitive_requests_per_minute = 10

[server.cors]
allowed_origins = ["http://localhost:3000"]
allow_credentials = true
# OPTIONS 预检缓存时长（秒）
max_age_secs = 600

[database]
# 支持 postgres / mysql / sqlite

# driver = "postgres"
# url = "postgres://cycms:cycms@localhost:5432/cycms"

# driver = "mysql"
# url = "mysql://cycms:cycms@localhost:3306/cycms"

driver = "sqlite"
url = "sqlite://data/cycms.db"

max_connections = 10

[auth]
# 生产环境务必替换为强随机密钥（至少 32 字节），使用 openssl 生成示例：openssl rand -hex 32
# 保持默认占位符时：仅允许绑定回环地址启动（并打警告），其他 host 会拒绝启动
jwt_secret = "4a47ade02724834cc752a2e4ac6a009d99cb2479899922cd2cf8b9329fcce4ec"
# jwt_secret = "CHANGE_ME_IN_PRODUCTION"

# access_token 有效期（秒），默认 15 分钟
access_token_ttl_secs = 900
# refresh_token 有效期（秒），默认 14 天
refresh_token_ttl_secs = 1209600

[auth.argon2]
m_cost = 19456
t_cost = 2
p_cost = 1

[media]
upload_dir = "uploads"
# 最大文件大小（字节），默认 10 MB
max_file_size = 10485760
allowed_mime_types = [
    "image/jpeg",
    "image/png",
    "image/gif",
    "image/webp",
    "application/pdf",
    "video/mp4",
]

[events]
# 单个事件桶的 broadcast channel 容量
channel_capacity = 256
# 单个 handler 处理一次事件的超时（秒）
handler_timeout_secs = 5

[observability]
# pretty 适合本地开发；生产环境建议改为 json
format = "pretty"
# 支持 tracing EnvFilter 语法；简单场景可直接用 trace/debug/info/warn/error
level = "info"
# 是否将关键业务事件写入 audit_logs
audit_enabled = true

[plugins]
# 插件存放目录
directory = "plugins"
wasm_enabled = true

[admin_extensions]
# 是否为后台与插件资产接口附加 same-origin CSP
csp_enabled = true
# 初始 rollout 默认走 report-only，确认稳定后可切到 false 强制执行
csp_report_only = true
# CSP report 和前端扩展遥测共用同一个接收端点
csp_report_uri = "/api/v1/admin/extensions/events"
# 诊断面板中保留的最近事件数
recent_event_capacity = 200

[host_rendering]
# 公开页优先走宿主生命周期；未命中拥有者时再回退兼容 SPA
public_pages_mode = "host-first"
# 后台仍保持兼容模式，后续阶段再切到 host-first / host-only
admin_shell_mode = "compat"
# 迁移期间继续保留 legacy plugin 兼容桥
legacy_plugin_compat = true
# 允许在没有预编译 registry 的情况下启动
compiled_registry_required = false
